<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Shipping ERP discovery questionnaire">
  <title>Shipping ERP Discovery</title>
  <style>
    :root{--ink:#12212b;--muted:#687780;--line:#dbe3e6;--sea:#0d7772;--sea2:#075853;--foam:#eff8f6;--paper:#fff;--sand:#f6f4ef;--warn:#a45b19;--shadow:0 18px 55px rgba(18,33,43,.10)}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:var(--sand);color:var(--ink);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}
    button,input,textarea,select{font:inherit} button{cursor:pointer}.shell{min-height:100vh;display:grid;grid-template-columns:320px minmax(0,1fr)}
    aside{position:sticky;top:0;height:100vh;padding:34px 30px;background:#102c35;color:#fff;overflow:auto}.mark{display:flex;gap:12px;align-items:center;font-weight:750;letter-spacing:.01em}.mark svg{width:34px;height:34px}.eyebrow{text-transform:uppercase;letter-spacing:.13em;font-size:11px;font-weight:800;color:#91d7cf;margin-top:60px}.aside-title{font-size:29px;line-height:1.14;margin:12px 0;color:#fff}.aside-copy{font-size:14px;color:#b8c9ce}.progress-label{display:flex;justify-content:space-between;font-size:12px;margin-top:35px;color:#cedadd}.progress{height:6px;background:#2b4750;border-radius:9px;overflow:hidden;margin-top:9px}.progress i{display:block;height:100%;width:0;background:#65cbbf;transition:width .3s}.steps{margin-top:28px;display:grid;gap:7px}.step{display:grid;grid-template-columns:24px 1fr;gap:10px;align-items:center;color:#7f969d;font-size:13px}.step b{height:24px;border:1px solid #3b5861;border-radius:50%;display:grid;place-items:center;font-size:10px}.step.active{color:#fff}.step.active b,.step.done b{background:#65cbbf;border-color:#65cbbf;color:#102c35}.step.done{color:#bcd1d5}
    main{padding:55px 6vw 90px}.card{max-width:850px;margin:auto;background:var(--paper);border:1px solid rgba(18,33,43,.06);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.card-head{padding:44px 48px 27px;border-bottom:1px solid var(--line)}.section-count{font-size:12px;text-transform:uppercase;letter-spacing:.12em;font-weight:800;color:var(--sea)}h1{font-size:34px;line-height:1.15;margin:11px 0 10px;letter-spacing:-.025em}h2{font-size:24px;line-height:1.25;margin:0 0 8px}p{margin:0;color:var(--muted)}.body{padding:34px 48px 45px}.field{margin-bottom:31px}.field:last-child{margin-bottom:0}.question{display:block;font-size:16px;font-weight:720;margin-bottom:8px}.help{display:block;color:var(--muted);font-size:13px;margin:-2px 0 12px}.req{color:var(--sea)}
    input[type=text],input[type=email],input[type=number],input[type=date],textarea,select{width:100%;border:1px solid #cbd6da;background:#fff;border-radius:11px;padding:13px 14px;color:var(--ink);outline:none;transition:.2s}textarea{min-height:110px;resize:vertical}input:focus,textarea:focus,select:focus{border-color:var(--sea);box-shadow:0 0 0 3px rgba(13,119,114,.12)}.choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.choice input{position:absolute;opacity:0;pointer-events:none}.choice span{display:flex;gap:10px;align-items:flex-start;height:100%;border:1px solid #d4dee1;border-radius:11px;padding:13px 14px;background:#fff;transition:.18s}.choice span:before{content:"";width:17px;height:17px;flex:0 0 auto;margin-top:2px;border:1.5px solid #9aacb2;border-radius:50%}.choice.checkbox span:before{border-radius:4px}.choice input:checked+span{border-color:var(--sea);background:var(--foam);box-shadow:inset 0 0 0 1px var(--sea)}.choice input:checked+span:before{border:5px solid var(--sea);background:#fff}.choice.checkbox input:checked+span:before{border:2px solid var(--sea);background:var(--sea);box-shadow:inset 0 0 0 3px var(--foam)}
    .actions{max-width:850px;margin:18px auto 0;display:flex;justify-content:space-between;align-items:center}.btn{border:0;border-radius:10px;padding:12px 20px;font-weight:750}.btn.primary{background:var(--sea);color:#fff}.btn.primary:hover{background:var(--sea2)}.btn.secondary{background:transparent;color:var(--ink)}.btn:disabled{opacity:.35;cursor:not-allowed}.save-note{font-size:12px;color:var(--muted)}.error{display:none;color:#a33333;font-size:13px;margin-top:8px}.field.invalid .error{display:block}.field.invalid input,.field.invalid textarea,.field.invalid select{border-color:#c65252}.field.invalid .choices{outline:2px solid rgba(198,82,82,.5);outline-offset:4px;border-radius:11px}.welcome{padding:54px 50px}.welcome .hero-icon{width:64px;height:64px;background:var(--foam);border-radius:18px;display:grid;place-items:center;color:var(--sea);margin-bottom:29px}.welcome h1{font-size:42px;max-width:620px}.welcome p{font-size:17px;max-width:650px}.facts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:30px 0}.fact{padding:16px;border:1px solid var(--line);border-radius:12px}.fact b{display:block;font-size:14px}.fact span{font-size:12px;color:var(--muted)}.privacy{font-size:12px!important;margin-top:18px}.review{display:grid;gap:18px}.review-section{border:1px solid var(--line);border-radius:14px;padding:19px}.review-section h3{margin:0 0 12px;font-size:16px}.review-row{display:grid;grid-template-columns:210px 1fr;gap:18px;padding:9px 0;border-top:1px solid #edf1f2;font-size:13px}.review-row:first-of-type{border-top:0}.review-row dt{color:var(--muted)}.review-row dd{margin:0;font-weight:600;white-space:pre-wrap}.complete{text-align:center;padding:58px 50px}.complete-icon{width:70px;height:70px;border-radius:50%;background:var(--foam);color:var(--sea);display:grid;place-items:center;margin:0 auto 22px;font-size:30px}.complete .buttons{display:flex;gap:10px;justify-content:center;margin-top:27px;flex-wrap:wrap}.hide{display:none!important}#submitError{color:#a33333;font-size:13px;margin-top:14px;display:none}
    @media(max-width:900px){.shell{grid-template-columns:1fr}aside{position:relative;height:auto;padding:22px 24px}.eyebrow,.aside-title,.aside-copy,.steps{display:none}.progress-label{margin-top:18px}main{padding:28px 16px 60px}.card-head,.body{padding-left:24px;padding-right:24px}.welcome,.complete{padding:38px 26px}.welcome h1{font-size:34px}.choices{grid-template-columns:1fr}.facts{grid-template-columns:1fr}.review-row{grid-template-columns:1fr;gap:3px}.actions{padding:0 5px}}
  </style>
</head>
<body>
<div class="shell">
  <aside>
    <div class="mark"><svg viewBox="0 0 40 40" fill="none" aria-hidden="true"><path d="M5 27c8-9 14-5 20-13 3 7 6 10 11 13-9 9-22 10-31 0Z" stroke="#65cbbf" stroke-width="2"/><path d="M8 28c8 2 16 2 25-1" stroke="#fff" stroke-width="2"/></svg><span>Shipping ERP Discovery</span></div>
    <div class="eyebrow">Project discovery</div><h2 class="aside-title">Help us understand how your operation really works.</h2><p class="aside-copy">Your answers will shape the workflows, permissions, integrations and implementation plan. Mostly multiple choice — very little typing.</p>
    <div class="progress-label"><span id="progressText">Not started</span><span id="progressPercent">0%</span></div><div class="progress"><i id="progressBar"></i></div><div class="steps" id="stepList"></div>
  </aside>
  <main><div class="card" id="card"></div><div class="actions" id="actions"></div></main>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ---- CONFIGURE ----
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
// -------------------
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const sections=[
 {id:'contact',title:'About your organisation',desc:'A little context helps us tailor the system to your company.',questions:[
  {id:'company',label:'Company name',type:'text',required:true},
  {id:'respondent',label:'Your name and designation',type:'text',required:true},
  {id:'email',label:'Work email',type:'email',required:true},
  {id:'business_model',label:'Which best describes your operation?',type:'radio',required:true,options:['Shipping line / vessel operator','Freight forwarder / logistics provider','Shipyard / shipbuilding','Marine procurement / chandling','Port or terminal operator','Project cargo / EPC logistics','Multiple business models','Other']},
  {id:'business_other',label:'Please describe your business model',type:'text',show:a=>a.business_model==='Other'},
  {id:'objective',label:'Main reasons for introducing this system',type:'checkbox',required:true,options:['Replace spreadsheets / manual tracking','Control costs and margins','Track jobs and shipments in one place','Give customers visibility','Reduce documentation errors','Faster quotations and approvals','Better management reporting','Standardise processes across branches','Other']},
  {id:'objective_other',label:'Tell us the other reason',type:'text',show:a=>(a.objective||[]).includes('Other')}]},
 {id:'operations',title:'How work moves',desc:'Map the real operational journey, including exceptions and bottlenecks.',questions:[
  {id:'workflow_stages',label:'Which stages exist in a typical job?',help:'Select every stage that applies from first enquiry to final payment.',type:'checkbox',required:true,options:['Enquiry / lead','Quotation','Booking / job opening','Vendor selection','Documentation','Cargo pickup / receipt','Tracking & milestones','Customs clearance','Delivery / handover','Invoicing','Payment collection','Job closure / P&L']},
  {id:'transport_modes',label:'Which transport modes do you manage?',type:'checkbox',required:true,options:['Ocean freight','Air freight','Road transport','Rail','Inland waterways','Port operations']},
  {id:'ocean_types',label:'Which ocean shipment types apply?',type:'checkbox',options:['FCL containers','LCL consolidation','Dry bulk','Liquid bulk','Breakbulk','Ro-Ro','Project / oversized cargo','Vessel supplies'],show:a=>(a.transport_modes||[]).includes('Ocean freight')},
  {id:'trade_scope',label:'Geographic scope',type:'checkbox',required:true,options:['Domestic India','Imports into India','Exports from India','Cross-trade / overseas-to-overseas','Worldwide operations']},
  {id:'monthly_volume',label:'Approximate jobs or shipments per month',type:'radio',required:true,options:['Under 25','25–100','101–500','501–2,000','More than 2,000']},
  {id:'pain_points',label:'Biggest problems in the current process',help:'Pick up to three that hurt most.',type:'checkbox',required:true,options:['Data scattered across spreadsheets / email','No visibility of shipment status','Slow quotations','Cost overruns discovered too late','Documentation errors / rework','Chasing approvals','Late invoicing / collections','No management reporting','Vendor performance issues','Compliance risk','Other']},
  {id:'pain_other',label:'Describe the other problem',type:'text',show:a=>(a.pain_points||[]).includes('Other')}]},
 {id:'users',title:'People and access',desc:'Define who works in the system and what each group should control.',questions:[
  {id:'user_groups',label:'Who will use the platform?',type:'checkbox',required:true,options:['Management','Sales / customer service','Operations','Procurement','Warehouse','Finance','Compliance','Vessel crew','Customers','Vendors / agents','Transport partners']},
  {id:'user_count',label:'Expected number of internal users in year one',type:'radio',required:true,options:['1–10','11–30','31–100','101–500','More than 500']},
  {id:'branch_count',label:'How many branches / operational locations?',type:'radio',required:true,options:['Single location','2–3','4–10','More than 10']},
  {id:'warehouse_count',label:'How many warehouses or yards?',type:'radio',required:true,options:['None','1','2–5','More than 5']},
  {id:'approval_rules',label:'Which actions require approval?',type:'checkbox',options:['Quotations / discounts','Vendor onboarding','Purchase requisitions','Purchase orders','Operational expenses','Supplier payments','Customer credit','Invoice cancellation','Document release']},
  {id:'approval_levels',label:'How many approval levels typically apply?',type:'radio',options:['One approver','Two levels','Three or more','Depends on value'],show:a=>(a.approval_rules||[]).length>0}]},
 {id:'modules',title:'Capabilities required',desc:'Prioritise what the first usable version must accomplish.',questions:[
  {id:'mvp_modules',label:'Select all modules needed',type:'checkbox',required:true,options:['CRM and enquiries','Quotations and rate management','Jobs / projects','Bookings and schedules','Procurement and RFQs','Vendor bid comparison','Purchase orders','Inventory and warehousing','Shipment / container tracking','Fleet / vessel management','Document management','Customer invoicing','Supplier bills and expenses','Collections and payments','Customer portal','Vendor portal','Dashboards and reports','Claims / incidents','Compliance']},
  {id:'must_have',label:'Which capabilities are non-negotiable for launch?',help:'Pick up to five from what you selected above.',type:'checkbox',required:true,options:['CRM and enquiries','Quotations and rate management','Jobs / projects','Bookings and schedules','Procurement and RFQs','Vendor bid comparison','Purchase orders','Inventory and warehousing','Shipment / container tracking','Fleet / vessel management','Document management','Customer invoicing','Supplier bills and expenses','Collections and payments','Customer portal','Vendor portal','Dashboards and reports','Claims / incidents','Compliance']},
  {id:'tracking_method',label:'How should shipments or assets be tracked?',type:'checkbox',options:['Manual status updates','Shipping-line APIs','AIS vessel tracking','GPS / telematics','Barcode / QR scan','RFID','Customer tracking links'],show:a=>(a.mvp_modules||[]).some(x=>x.includes('tracking')||x.includes('Inventory')||x.includes('Fleet'))},
  {id:'warehouse_needs',label:'What warehouse activities must be supported?',type:'checkbox',options:['Goods receipt','Putaway and bin locations','Stock transfer','Picking and packing','Dispatch','Batch / serial tracking','Damage / shortage recording','Barcode labels','Cycle counts'],show:a=>(a.mvp_modules||[]).includes('Inventory and warehousing')}]},
 {id:'documents',title:'Documents and compliance',desc:'Identify the documents, rules and audit controls surrounding every job.',questions:[
  {id:'documents_used',label:'Which documents do you create, receive or approve?',type:'checkbox',required:true,options:['Quotation','Booking confirmation','Purchase order','Commercial invoice','Packing list','Bill of lading','Shipping bill','Bill of entry','Certificate of origin','Delivery order','e-Way bill','Insurance certificate','Survey / inspection report','SOP or checklist','Other']},
  {id:'document_other',label:'List any additional documents',type:'text',show:a=>(a.documents_used||[]).includes('Other')},
  {id:'document_source',label:'How are documents prepared and stored today?',type:'checkbox',required:true,options:['Word / Excel templates','Email attachments','Shared drive (Google Drive / SharePoint)','Existing software system','Paper files','WhatsApp / messaging apps']},
  {id:'compliance',label:'Which compliance requirements apply?',type:'checkbox',options:['Indian GST / e-invoicing','TDS','ICEGATE / customs','DGFT','IMO / SOLAS','Dangerous goods / IMDG','Sanctions screening','KYC / vendor due diligence','ISO processes','Client-specific compliance','Other']},
  {id:'audit',label:'Do you require a complete audit trail of edits, approvals and downloads?',type:'radio',required:true,options:['Yes, for every critical action','Only for approvals and finance','Not sure—please recommend','No']}]},
 {id:'finance',title:'Commercials and finance',desc:'Clarify how rates, costs, currencies, taxes and profitability are controlled.',questions:[
  {id:'finance_scope',label:'Required finance depth',type:'radio',required:true,options:['Operational finance only','Full accounting inside the ERP','Integrate with existing accounting software','Not sure—please recommend']},
  {id:'currencies',label:'Currencies commonly used',type:'checkbox',required:true,options:['INR only','USD','EUR','AED','SGD','GBP','Other']},
  {id:'pricing_method',label:'How are customer prices set?',type:'checkbox',required:true,options:['Standard rate cards','Negotiated per customer','Spot quotes per job','Cost plus margin %','Commission based','Varies by service']},
  {id:'profitability',label:'What profitability views are essential?',type:'checkbox',options:['Per job / shipment','Per customer','Per route / trade lane','Per vessel','Per salesperson','Per branch','Budget vs actual','Accrued vs invoiced']},
  {id:'credit',label:'Do you manage customer credit limits and overdue controls?',type:'radio',required:true,options:['Yes','No','Not currently, but required']}]},
 {id:'integrations',title:'Technology and integrations',desc:'Connect the ERP with systems your teams already depend on.',questions:[
  {id:'current_tools',label:'What tools are used today?',type:'checkbox',required:true,options:['Excel / Google Sheets','Email','WhatsApp','Tally','Zoho','SAP','Legacy / custom ERP','Accounting software (other)','None / mostly manual','Other']},
  {id:'current_tools_other',label:'Name the other tools',type:'text',show:a=>(a.current_tools||[]).includes('Other')},
  {id:'integrations',label:'Which integrations may be required?',type:'checkbox',options:['Tally','Zoho Books','SAP','GST / e-invoicing','ICEGATE','Email','WhatsApp','Bank feeds','Payment gateway','Shipping-line APIs','AIS provider','GPS provider','Google Drive / SharePoint','Power BI','Other']},
  {id:'integration_other',label:'List any other systems or specific providers',type:'text',show:a=>(a.integrations||[]).includes('Other')},
  {id:'data_migration',label:'Is historical data available for migration?',type:'radio',required:true,options:['Yes—in spreadsheets','Yes—in another ERP','Partial / inconsistent data','No migration required','Not sure']},
  {id:'samples',label:'What sample material can you provide after this questionnaire?',type:'checkbox',options:['Spreadsheets','Forms / templates','Reports','SOPs','Approval matrix','Sample invoices / documents','Current system screenshots','API documentation']}]},
 {id:'experience',title:'Experience, reporting and security',desc:'Define how the platform should feel and what decision-makers need to see.',questions:[
  {id:'devices',label:'Where should the system work?',type:'checkbox',required:true,options:['Desktop web browser','Mobile web browser','Dedicated mobile app','Warehouse scanning device','Tablet','Offline / low-connectivity environment']},
  {id:'dashboards',label:'What should management see immediately on the dashboard?',type:'checkbox',required:true,options:['Active jobs & status','Revenue and margin','Shipments in transit','Pending approvals','Overdue payments','Cost overruns','Vendor performance','Branch comparison','Compliance / document alerts']},
  {id:'alerts',label:'Which alerts would be useful?',type:'checkbox',options:['Shipment delays','Missing documents','Approval pending','Cost overrun','Low stock','Payment overdue','Credit limit breach','Compliance expiry','Vendor performance issue','Operational milestone due']},
  {id:'security',label:'Required security controls',type:'checkbox',options:['Role-based permissions','Two-factor authentication','Single sign-on','IP restrictions','Data encryption','Audit logs','Automatic backups','India data residency','Customer data separation','Disaster recovery']},
  {id:'design_style',label:'Preferred interface style',type:'radio',required:true,options:['Modern and simple','Industrial and information-dense','Balanced: clean but operationally detailed','Match an existing brand system']}]},
 {id:'delivery',title:'Implementation expectations',desc:'Set realistic priorities for launch, rollout and success.',questions:[
  {id:'launch_date',label:'Desired date for the first usable version',type:'date',required:true},
  {id:'budget',label:'Indicative implementation budget',type:'radio',required:true,options:['Under ₹5 lakh','₹5–15 lakh','₹15–40 lakh','₹40 lakh–₹1 crore','Above ₹1 crore','To be determined after scoping']},
  {id:'deployment',label:'Preferred deployment',type:'radio',required:true,options:['Cloud-hosted SaaS','Private cloud','On-premise','No preference—please recommend']},
  {id:'success_measure',label:'Six months after launch, which results would make this successful?',type:'checkbox',required:true,options:['All jobs managed in one system','Faster quotations','Real-time shipment visibility','Fewer documentation errors','Faster invoicing / collections','Clear job-level profitability','Reduced manual data entry','Better vendor decisions','Management dashboard adopted']},
  {id:'decision_maker',label:'Who will approve the scope and final implementation?',type:'radio',required:true,options:['Owner / MD','Board / directors','Department heads jointly','External consultant involved','Other']},
  {id:'constraints',label:'Any fixed constraints, contractual requirements or concerns? (optional)',type:'textarea'}]}
];
let answers=JSON.parse(localStorage.getItem('shippingErpAnswers')||'{}'), current=Number(localStorage.getItem('shippingErpStep')||-1);
const card=document.getElementById('card'),actions=document.getElementById('actions');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function visible(q){return !q.show||q.show(answers)}
function save(){localStorage.setItem('shippingErpAnswers',JSON.stringify(answers));localStorage.setItem('shippingErpStep',current)}
function renderSteps(){document.getElementById('stepList').innerHTML=sections.map((s,i)=>`<div class="step ${i===current?'active':i<current?'done':''}"><b>${i<current?'✓':i+1}</b><span>${esc(s.title)}</span></div>`).join('')}
function updateProgress(){let pct=current<0?0:current>=sections.length?100:Math.round(((current+1)/sections.length)*100);document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressPercent').textContent=pct+'%';document.getElementById('progressText').textContent=current<0?'Not started':current>=sections.length?'Complete':`Section ${current+1} of ${sections.length}`;renderSteps()}
function welcome(){card.innerHTML=`<div class="welcome"><div class="hero-icon"><svg width="32" viewBox="0 0 40 40" fill="none"><path d="M5 27c8-9 14-5 20-13 3 7 6 10 11 13-9 9-22 10-31 0Z" stroke="currentColor" stroke-width="2"/><path d="M8 28c8 2 16 2 25-1" stroke="currentColor" stroke-width="2"/></svg></div><div class="section-count">Shipping ERP discovery</div><h1>Let’s design the right operating system for your business.</h1><p>This guided questionnaire helps us understand your workflows, teams, documents and reporting needs before recommending a solution. Almost everything is multiple choice.</p><div class="facts"><div class="fact"><b>10–15 minutes</b><span>Estimated completion time</span></div><div class="fact"><b>Save and return</b><span>Progress stays on this device</span></div><div class="fact"><b>Mostly clicking</b><span>Very little typing needed</span></div></div><p class="privacy">Please avoid entering passwords, banking credentials or personal identity numbers.</p></div>`;actions.innerHTML=`<span class="save-note">Prepared for requirements discovery</span><button class="btn primary" data-act="start">Begin questionnaire</button>`;updateProgress()}
function inputHTML(q){let v=answers[q.id]??'';if(q.type==='textarea')return `<textarea id="${q.id}" data-input="${q.id}" placeholder="${esc(q.placeholder||'')}">${esc(v)}</textarea>`;if(q.type==='radio'||q.type==='checkbox'){let arr=Array.isArray(v)?v:[];return `<div class="choices">${q.options.map(o=>`<label class="choice ${q.type==='checkbox'?'checkbox':''}"><input type="${q.type}" name="${q.id}" value="${esc(o)}" data-choice="${q.id}" data-ctype="${q.type}" ${q.type==='radio'?v===o?'checked':'':arr.includes(o)?'checked':''}><span>${esc(o)}</span></label>`).join('')}</div>`}return `<input id="${q.id}" data-input="${q.id}" type="${q.type}" value="${esc(v)}" placeholder="${esc(q.placeholder||'')}">`}
function render(){if(current<0)return welcome();if(current===sections.length)return review();if(current>sections.length)return complete();let s=sections[current];card.innerHTML=`<div class="card-head"><div class="section-count">Section ${current+1} of ${sections.length}</div><h1>${esc(s.title)}</h1><p>${esc(s.desc)}</p></div><div class="body">${s.questions.filter(visible).map(q=>`<div class="field" data-id="${q.id}"><label class="question" for="${q.id}">${esc(q.label)} ${q.required?'<span class="req">*</span>':''}</label>${q.help?`<span class="help">${esc(q.help)}</span>`:''}${inputHTML(q)}<div class="error">Please answer this question before continuing.</div></div>`).join('')}</div>`;actions.innerHTML=`<button class="btn secondary" data-act="back">Back</button><span class="save-note">Answers save automatically</span><button class="btn primary" data-act="next">${current===sections.length-1?'Review answers':'Continue'}</button>`;updateProgress();window.scrollTo({top:0,behavior:'smooth'})}
function setAnswer(id,v){answers[id]=v;save()}
function choiceAnswer(id,val,type,checked){if(type==='radio')answers[id]=val;else{let a=Array.isArray(answers[id])?answers[id]:[];answers[id]=checked?[...new Set([...a,val])]:a.filter(x=>x!==val)}save();render()}
function validSection(){let ok=true;sections[current].questions.filter(q=>visible(q)&&q.required).forEach(q=>{let v=answers[q.id],bad=v==null||v===''||(Array.isArray(v)&&!v.length);let el=document.querySelector(`.field[data-id="${q.id}"]`);el?.classList.toggle('invalid',bad);if(bad)ok=false});document.querySelector('.field.invalid')?.scrollIntoView({behavior:'smooth',block:'center'});return ok}
function next(){if(!validSection())return;current++;save();render()}
function back(){current--;save();render()}
function review(){card.innerHTML=`<div class="card-head"><div class="section-count">Review</div><h1>Check your answers</h1><p>You can return to any section before submitting.</p></div><div class="body review">${sections.map((s,i)=>`<section class="review-section"><div style="display:flex;justify-content:space-between;gap:15px"><h3>${esc(s.title)}</h3><button class="btn secondary" style="padding:2px 8px;color:var(--sea)" data-goto="${i}">Edit</button></div><dl>${s.questions.filter(q=>visible(q)&&answers[q.id]!=null&&answers[q.id]!==''&&(!Array.isArray(answers[q.id])||answers[q.id].length)).map(q=>`<div class="review-row"><dt>${esc(q.label)}</dt><dd>${esc(Array.isArray(answers[q.id])?answers[q.id].join(', '):answers[q.id])}</dd></div>`).join('')}</dl></section>`).join('')}</div>`;actions.innerHTML=`<button class="btn secondary" data-act="back">Back</button><span id="submitError"></span><button class="btn primary" id="submitBtn" data-act="submit">Submit answers</button>`;updateProgress();window.scrollTo({top:0,behavior:'smooth'})}
function goTo(i){current=i;save();render()}
async function submitForm(){const btn=document.getElementById('submitBtn'),errEl=document.getElementById('submitError');btn.disabled=true;btn.textContent='Submitting…';errEl.style.display='none';answers._completedAt=new Date().toISOString();const {error}=await supabase.from('erp_spec_responses').insert({company_name:answers.company||null,contact_email:answers.email||null,answers});if(error){errEl.textContent='Could not submit: '+error.message+'. Please retry or use the download buttons and email us the file.';errEl.style.display='inline';btn.disabled=false;btn.textContent='Submit answers';current=sections.length+1;save();render();return}answers._submitted=true;current=sections.length+1;save();render()}
function complete(){const saved=answers._submitted?`<p>Your answers were submitted successfully — no further action needed. You may also keep a copy below.</p>`:`<p style="color:var(--warn)">Online submission did not complete. Please download the brief below and email it to your project contact.</p>`;card.innerHTML=`<div class="complete"><div class="complete-icon">✓</div><div class="section-count">Discovery complete</div><h1>Thank you.</h1>${saved}<div class="buttons"><button class="btn primary" data-act="dl-text">Download requirements brief</button><button class="btn" data-act="dl-json">Download structured data</button></div><button class="btn secondary" style="margin-top:16px" data-goto="0">Review or edit answers</button></div>`;actions.innerHTML='';updateProgress();window.scrollTo({top:0,behavior:'smooth'})}
function brief(){let lines=[`SHIPPING ERP — DISCOVERY BRIEF`,`Company: ${answers.company||'—'}`,`Prepared by: ${answers.respondent||'—'}`,`Completed: ${answers._completedAt?new Date(answers._completedAt).toLocaleString():'—'}`,''];sections.forEach(s=>{lines.push(s.title.toUpperCase(),'-'.repeat(s.title.length));s.questions.filter(q=>answers[q.id]!=null&&answers[q.id]!==''&&(!Array.isArray(answers[q.id])||answers[q.id].length)).forEach(q=>lines.push(`${q.label}\n${Array.isArray(answers[q.id])?answers[q.id].join(', '):answers[q.id]}\n`));lines.push('')});return lines.join('\n')}
function download(name,data,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
document.addEventListener('click',e=>{const b=e.target.closest('[data-act],[data-goto]');if(!b)return;if(b.dataset.goto!=null)return goTo(Number(b.dataset.goto));const act=b.dataset.act;if(act==='start'){current=0;save();render()}else if(act==='next')next();else if(act==='back')back();else if(act==='submit')submitForm();else if(act==='dl-text')download(`${(answers.company||'client').replace(/[^a-z0-9]+/gi,'-')}-shipping-erp-brief.txt`,brief(),'text/plain');else if(act==='dl-json')download(`${(answers.company||'client').replace(/[^a-z0-9]+/gi,'-')}-shipping-erp-data.json`,JSON.stringify(answers,null,2),'application/json')});
document.addEventListener('input',e=>{const id=e.target.dataset.input;if(id)setAnswer(id,e.target.value)});
document.addEventListener('change',e=>{const id=e.target.dataset.choice;if(id)choiceAnswer(id,e.target.value,e.target.dataset.ctype,e.target.checked)});
render();
</script>
</body>
</html>
